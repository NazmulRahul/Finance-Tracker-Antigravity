services:
  - type: web
    name: finance-tracker-api
    runtime: docker
    plan: free
    dockerFilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        fromService:
          type: web
          name: finance-tracker-api
          property: host
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
